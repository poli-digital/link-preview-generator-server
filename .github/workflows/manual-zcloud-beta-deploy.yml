name: deploy zcloud beta
on:
  workflow_dispatch:

jobs:
  zCloudBetaDeploy:
    runs-on: gharss
    container:
      image: public.ecr.aws/p1e5c6b5/zcloud-cli:latest
    permissions:
      deployments: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub deployment
        uses: chrnorm/deployment-action@v2
        id: deployment
        with:
          token: '${{ github.token }}'
          environment-url: https://laravel-beta-polidigital.svc-us3.zcloud.ws
          environment: beta

      - name: Deploy with zCloud
        run: zcloud deploy --user-token $ZCLOUDTOKEN --env $ZCLOUDENVBETA

      - name: Update deployment status (success)
        if: success()
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          environment-url: https://laravel-beta-polidigital.svc-us3.zcloud.ws
          state: 'success'
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}

      - name: Update deployment status (failure)
        if: failure()
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          environment-url: https://laravel-beta-polidigital.svc-us3.zcloud.ws
          state: 'failure'
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}

    env:
      ZCLOUDENVBETA: ${{ vars.ZCLOUDENVBETA }}
      ZCLOUDTOKEN: ${{ secrets.ZCLOUDTOKEN }}
